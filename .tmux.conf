#set-option -g status-right "#[bg=#3C3836, fg=#7C6F64] %Y-%m-%d %H:%M:%S #[bg=#A89984, fg=#3C3836]#{?client_prefix,#[bg=#fe8019],#[bg=#A89984]} #{host_short} "

set-option -g status-left "#[bg=#458588, fg=#32302f]#{?client_prefix,#[bg=#fe8019],#[bg=#458588]} #{session_name} #[bg=#3C3836, fg=#458588]#{?client_prefix,#[fg=#fe8019],#[fg=#458588]} #{window_name} #[fg=#3C3836,bg=#282828]#[fg=#d3869b,bg=#282828] #(whoami) ➤    "
set-option -g status-right "#[bg=#262626, fg=#3C3836]#[bg=#3c3836, fg=#7C6F64] %Y-%m-%d %H:%M:%S #[bg=#3C3836, fg=#3C3836]#{?client_prefix,#[fg=#fe8019],#[fg=#d3869b]}#[bg=#d3869b, fg=#3C3836]#{?client_prefix,#[bg=#fe8019],#[bg=#d3869b]} #{host_short} "

set-option -wg window-status-current-format " #{window_index}  #{window_name} "
set-option -wg window-status-format " #{window_index}  #{window_name} "
